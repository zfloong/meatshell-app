<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incerto Center · 塔勒布宇宙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* 首页专用样式 */
        .hero-container {
            height: 85vh; /* 占据大部分屏幕 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* 巨大的 LOGO 锚点 */
        .hero-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            /* 锚点也用渐变金 */
            background: var(--text-gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0.8;
            filter: drop-shadow(0 0 30px rgba(212, 180, 131, 0.3)); /* 辉光 */
            animation: float 6s ease-in-out infinite;
        }

        /* 主标题 */
        .hero-title {
            font-size: 5rem; /* 极大 */
            letter-spacing: -2px;
            margin-bottom: 1rem;
            color: #fff;
            /* 细微的文字阴影增加立体感 */
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 副标题 */
        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--text-muted);
            max-width: 600px;
            font-weight: 300;
            margin-bottom: 4rem;
        }

        /* 极简的链接区域 */
        .hero-cta {
            margin-top: 2rem;
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(5px);
        }

        .hero-cta:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(212, 180, 131, 0.05);
            box-shadow: 0 0 20px rgba(212, 180, 131, 0.1);
            transform: translateY(-2px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        
        <i class="ri-anchor-line hero-icon"></i>
        
        <h1 class="hero-title">The Incerto</h1>
        
        <p class="hero-subtitle">
            思维与日常生活的实验室。<br>
            关于随机性、概率、不透明性与决策。
        </p>

        <a href="wild.html" class="hero-cta">
            进入狂野生长系统 &rarr;
        </a>

    </div>

    <script src="js/global.js"></script>

</body>
</html>
