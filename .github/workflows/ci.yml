name: CI (tauri frontend)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build & check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Checkout meatshell INSIDE workspace (GH Actions requires
      #      checkout paths to be under the working tree) ----
      - name: Checkout meatshell backend
        uses: actions/checkout@v4
        with:
          repository: zfloong/meatshell
          path: meatshell
          ref: main

      # ---- Patch Cargo.toml so the path dep matches CI layout ----
      #      Local dev:  ../../meatshell  (sibling repos)
      #      CI:         ../meatshell    (subdirectory of workspace)
      - name: Patch meatshell path for CI
        shell: pwsh
        run: |
          (Get-Content src-tauri/Cargo.toml -Raw) -replace 'path = "../../meatshell"', 'path = "../meatshell"' | Set-Content src-tauri/Cargo.toml

      # ---- Node.js ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: npm ci

      # ---- Generate Tauri icons ----
      - name: Generate placeholder icon
        run: node scripts/generate-icon.mjs

      - name: Generate Tauri icon set
        run: npx tauri icon src-tauri/icons/icon.png

      # ---- Frontend build ----
      - name: TypeScript check + Vite build
        run: npm run build

      # ---- Rust backend ----
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml', 'meatshell/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (Tauri backend)
        run: cargo check
        working-directory: src-tauri

      # ---- Full Tauri build (binary) ----
      - name: Tauri build
        run: npx tauri build
        env:
          TAURI_SKIP_DEVSERVER_CHECK: "true"
